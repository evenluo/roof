name: DNS Apply

on:
  push:
    branches:
      - master
    paths:
      - 'tools/dnsctl/dns/dns.yaml'
  workflow_dispatch:
    inputs:
      zone:
        description: 'Zone to apply (leave empty for all zones)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: dns-apply
  cancel-in-progress: false   # 排队执行，不取消正在进行的 apply

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: tools/dnsctl

      - name: Run apply
        # ZONE_INPUT 通过 env 传入，避免 ${{ }} 直接嵌入 shell 脚本导致注入
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          Q_DNS_RECORD_SECRET_ID: ${{ secrets.Q_DNS_RECORD_SECRET_ID }}
          Q_DNS_RECORD_SECRET_KEY: ${{ secrets.Q_DNS_RECORD_SECRET_KEY }}
          ZONE_INPUT: ${{ github.event.inputs.zone }}
        run: |
          if [ -n "$ZONE_INPUT" ]; then
            bun tools/dnsctl/src/index.ts apply --file tools/dnsctl/dns/dns.yaml --zone "$ZONE_INPUT"
          else
            bun tools/dnsctl/src/index.ts apply --file tools/dnsctl/dns/dns.yaml
          fi
