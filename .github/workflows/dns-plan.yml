name: DNS Plan

on:
  pull_request:
    paths:
      - 'tools/dnsctl/dns/dns.yaml'

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: tools/dnsctl

      - name: Run plan
        id: plan
        # set +e 确保 plan 失败时不中断，让后续 comment 步骤仍能执行。
        # 多行输出写入 $GITHUB_ENV（heredoc 语法），单行 exit_code 写入 $GITHUB_OUTPUT 供 if 条件使用。
        run: |
          set +e
          OUTPUT=$(bun tools/dnsctl/src/index.ts plan --file tools/dnsctl/dns/dns.yaml 2>&1)
          EXIT_CODE=$?
          {
            echo "PLAN_OUTPUT<<__PLAN_EOF__"
            echo "$OUTPUT"
            echo "__PLAN_EOF__"
            echo "PLAN_EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_ENV"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          Q_DNS_RECORD_SECRET_ID: ${{ secrets.Q_DNS_RECORD_SECRET_ID }}
          Q_DNS_RECORD_SECRET_KEY: ${{ secrets.Q_DNS_RECORD_SECRET_KEY }}

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dns-plan -->';
            const status = process.env.PLAN_EXIT_CODE === '0' ? '✅ Plan succeeded' : '❌ Plan failed';
            const body = `## DNS Plan\n${marker}\n${status}\n\n\`\`\`\n${process.env.PLAN_OUTPUT}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
